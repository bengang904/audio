<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIO.加密(AES-GCM)</title>
    <style>
        :root {
            --bg: #000;
            --container-bg: #0a0a0a;
            --accent: #ff4d4d;
            --reset: #d1d1d1;
            --text: #e0e0e0;
            --border: #222;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            box-sizing: border-box;
        }
        .container { 
            background: var(--container-bg); 
            padding: 20px; 
            width: 100%;
            max-width: 500px; 
            border: 1px solid var(--border);
            box-sizing: border-box;
        }
        h2 { 
            font-size: clamp(5px, 6vw, 17px);
            color: var(--accent); 
            border-left: 3px solid var(--accent); 
            padding-left: 10px; 
            margin: 0 0 20px 0; 
        }
        .controls { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .file-wrapper { 
            position: relative; 
            height: 50px; 
            border: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #111; 
            cursor: pointer;
            padding: 0 10px;
        }
        .file-wrapper span {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-wrapper input { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            opacity: 0; 
            cursor: pointer; 
        }
        input[type="text"] { 
            background: #111; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            outline: none; 
            font-size: 14px;
            border-radius: 0;
        }
        .progress-container { 
            width: 100%; 
            height: 2px; 
            background: #111; 
            display: none; 
        }
        .progress-bar { 
            width: 0%; 
            height: 100%; 
            background: var(--accent); 
        }
        .btn-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        button { 
            padding: 15px 5px; 
            cursor: pointer; 
            border: 1px solid var(--accent); 
            background: transparent; 
            color: var(--accent); 
            font-weight: bold; 
            font-size: 13px;
            border-radius: 0;
        }
        #resetBtn {
            grid-column: span 2;
            justify-self: center; 
            width: 50%;         
            border-color: var(--reset);
            color: var(--reset);
            margin-top: 5px;
        }
        #downloadBtn { 
            grid-column: span 2; 
        }
        @media (max-width: 400px) {
            .btn-grid {
                grid-template-columns: 1fr; 
            }
            #encryptBtn, #decryptBtn, #resetBtn, #downloadBtn {
                grid-column: span 1; 
                width: 100%;      
            }
        }
        button:disabled {
            border-color: #333;
            color: #333;
        }
        audio { 
            width: 100%; 
            margin-top: 20px; 
            filter: invert(1) hue-rotate(180deg); 
            display: none; 
        }
        .status { 
            font-size: 11px; 
            color: #555; 
            margin-top: 15px; 
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>AUDIO.加密 (AES-GCM)</h2>
    <div class="controls">
        <div class="file-wrapper">
            <span id="fileLabel">选择 WAV 文件</span>
            <input type="file" id="audioInput" accept=".wav">
        </div>
        <input type="text" id="passwordInput" placeholder="输入密钥..." spellcheck="false">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="btn-grid">
            <button id="encryptBtn">加密</button>
            <button id="decryptBtn">解密</button>
            <button id="resetBtn">重置</button>
            <button id="downloadBtn" disabled>下载结果</button>
        </div>
    </div>
    <audio id="audioPlayer" controls></audio>
    <div class="status" id="statusMsg">WAV 音频文件：前 44 字节是文件头，后面是原始采样数据。容错性极高，若修改了数据位，只是改变了声音的波形，文件结构依然合法，加密后播放出来是“噪音”，解密后还原。MP3 音频文件：数据结构极其复杂，由无数个帧组成，每个帧都有自己的头信息。若修改了帧头或压缩数据，解码器将无法识别，直接判定文件损坏。因此，你需要准备一个 WAV 格式的音频文件，也可以在 https://ffmpeg.2024-10-24.zip 进行在线格式转换。</div>
</div>

<script>
    const ui = {
        input: document.getElementById('audioInput'),
        label: document.getElementById('fileLabel'),
        pass: document.getElementById('passwordInput'),
        enc: document.getElementById('encryptBtn'),
        dec: document.getElementById('decryptBtn'),
        dl: document.getElementById('downloadBtn'),
        status: document.getElementById('statusMsg'),
        player: document.getElementById('audioPlayer'),
        prog: document.getElementById('progressBar'),
        cont: document.getElementById('progressContainer')
    };
    let resultBlob = null;

    ui.input.onchange = (e) => { 
        if (e.target.files[0]) {
            ui.label.innerText = e.target.files[0].name;
            ui.dl.disabled = true;
            ui.player.style.display = 'none';
        }
    };

    async function derive(password, salt, usage) {
        const encoder = new TextEncoder();
        const baseKey = await crypto.subtle.importKey(
            "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: 600000, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false, usage
        );
    }

    async function execute(mode) {
        if (!ui.input.files[0] || !ui.pass.value) return alert("信息缺失");
        
        ui.enc.disabled = ui.dec.disabled = true;
        ui.cont.style.display = 'block';
        ui.prog.style.width = "30%";
        ui.status.innerText = "密钥计算中 (600,000次迭代)...";

        try {
            const file = ui.input.files[0];
            const buffer = await file.arrayBuffer();
            const fullData = new Uint8Array(buffer);

            let offset = 44;
            for (let i = 0; i < 200; i++) {
                if (fullData[i] === 0x64 && fullData[i+1] === 0x61 && fullData[i+2] === 0x74 && fullData[i+3] === 0x61) {
                    offset = i + 8; break;
                }
            }

            const header = fullData.slice(0, offset);
            const pcm = fullData.slice(offset);
            ui.prog.style.width = "60%";

            let processedPcm;
            if (mode === 'encrypt') {
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await derive(ui.pass.value, salt, ["encrypt"]);
                const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, pcm);
                
                processedPcm = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                processedPcm.set(salt, 0);
                processedPcm.set(iv, 16);
                processedPcm.set(new Uint8Array(encrypted), 28);
                ui.status.innerText = "加密成功";
            } else {
                const salt = pcm.slice(0, 16);
                const iv = pcm.slice(16, 28);
                const data = pcm.slice(28);
                const key = await derive(ui.pass.value, salt, ["decrypt"]);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
                processedPcm = new Uint8Array(decrypted);
                ui.status.innerText = "解密成功";
            }

            const finalData = new Uint8Array(header.length + processedPcm.length);
            finalData.set(header);
            finalData.set(processedPcm, header.length);

            const dv = new DataView(finalData.buffer);
            dv.setUint32(4, finalData.length - 8, true);
            dv.setUint32(offset - 4, processedPcm.length, true);

            resultBlob = new Blob([finalData], { type: 'audio/wav' });
            ui.player.src = URL.createObjectURL(resultBlob);
            ui.player.style.display = 'block';
            ui.dl.disabled = false;
            ui.prog.style.width = "100%";
        } catch (e) {
            alert("错误：密钥不正确或数据已被破坏");
            ui.status.innerText = "操作失败";
        }
        ui.enc.disabled = ui.dec.disabled = false;
        setTimeout(() => ui.cont.style.display = 'none', 500);
    }

    ui.enc.onclick = () => execute('encrypt');
    ui.dec.onclick = () => execute('decrypt');
    ui.dl.onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(resultBlob);
        a.download = (ui.status.innerText === "加密成功" ? "ENC_" : "DEC_") + ui.input.files[0].name;
        a.click();
    };
    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
