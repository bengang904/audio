<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIO.加密</title>
    <script src="https://unpkg.com/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --container-bg: #0a0a0a;
            --accent: #ff4d4d;
            --reset: #d1d1d1;
            --text: #e0e0e0;
            --border: #222;
        }
        body { 
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
             background: var(--bg); 
             color: var(--text); 
             margin: 0; 
             display: flex; 
             justify-content: center; 
             padding: 15px; 
             box-sizing: border-box;
        }
        .container { 
             background: var(--container-bg); 
             padding: 20px; 
             width: 100%;
            max-width: 500px; 
             border: 1px solid var(--border);
            box-sizing: border-box;
        }
        h2 { 
             font-size: 1rem; 
             color: var(--accent); 
             border-left: 3px solid var(--accent); 
             padding-left: 10px; 
             margin: 0 0 20px 0; 
         }
        .controls { 
             display: flex; 
             flex-direction: column; 
             gap: 15px; 
         }
        .file-wrapper { 
             position: relative; 
             height: 50px; 
             border: 1px solid var(--border); 
             display: flex; 
             align-items: center; 
             justify-content: center; 
             background: #111; 
             cursor: pointer;
            padding: 0 10px;
        }
        .file-wrapper span {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-wrapper input { 
             position: absolute; 
             width: 100%; 
             height: 100%; 
             opacity: 0; 
             cursor: pointer; 
         }
        input[type="text"] { 
             background: #111; 
             border: 1px solid var(--border); 
             color: #fff; 
             padding: 14px; 
             outline: none; 
             font-size: 14px;
            border-radius: 0;
        }
        .progress-container { 
             width: 100%; 
             height: 2px; 
             background: #111; 
             display: none; 
         }
        .progress-bar { 
             width: 0%; 
             height: 100%; 
             background: var(--accent); 
         }
        .btn-grid { 
             display: grid; 
             grid-template-columns: 1fr 1fr; 
             gap: 10px; 
         }
        button { 
             padding: 15px 5px; 
             cursor: pointer; 
             border: 1px solid var(--accent); 
             background: transparent; 
             color: var(--accent); 
             font-weight: bold; 
             font-size: 13px;
            border-radius: 0;
        }
        #resetBtn {
            border-color: var(--reset);
            color: var(--reset);
        }
        #downloadBtn { 
             grid-column: span 2; 
         }
        @media (max-width: 350px) {
            .btn-grid {
                grid-template-columns: 1fr;
            }
            #downloadBtn {
                grid-column: span 1;
            }
        }
        button:disabled {
            border-color: #333;
            color: #333;
        }
        audio { 
             width: 100%; 
             margin-top: 20px; 
             filter: invert(1); 
             display: none; 
         }
        .status { 
             font-size: 11px; 
             color: #555; 
             margin-top: 15px; 
             text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>AUDIO.加密</h2>
    <div class="controls">
        <div class="file-wrapper">
            <span id="fileLabel">选择 WAV 文件</span>
            <input type="file" id="audioInput" accept=".wav">
        </div>
        <input type="text" id="passwordInput" placeholder="输入密钥..." spellcheck="false">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="btn-grid">
            <button id="runBtn">执行变换</button>
            <button id="resetBtn">清空所有</button>
            <button id="downloadBtn" disabled>下载处理结果</button>
        </div>
    </div>
    <audio id="audioPlayer" controls></audio>
    <div class="status" id="statusMsg">WAV 是高保真的音频容器</div>
</div>
<script>
    const audioInput = document.getElementById('audioInput');
    const fileLabel = document.getElementById('fileLabel');
    const passwordInput = document.getElementById('passwordInput');
    const runBtn = document.getElementById('runBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMsg = document.getElementById('statusMsg');
    const audioPlayer = document.getElementById('audioPlayer');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    let currentResultBlob = null;

    audioInput.onchange = (e) => { 
         if (e.target.files[0]) {
            fileLabel.innerText = e.target.files[0].name;
            downloadBtn.disabled = true;
            audioPlayer.style.display = 'none';
        }
    };

    async function process() {
        if (!audioInput.files[0]) return;
        if (!passwordInput.value) {
            alert("请输入密钥");
            return;
        }
        
        runBtn.disabled = true;
        downloadBtn.disabled = true;
        progressContainer.style.display = 'block';
        statusMsg.innerText = "正在读取...";

        const file = audioInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const data = new Uint8Array(arrayBuffer);

        let dataOffset = 44;
        for (let i = 0; i < 100; i++) {
            if (data[i] === 0x64 && data[i+1] === 0x61 && data[i+2] === 0x74 && data[i+3] === 0x61) {
                dataOffset = i + 8;
                break;
            }
        }

        let hash = forge.md.sha256.create();
        hash.update(passwordInput.value);
        let key = forge.util.binary.raw.decode(hash.digest().data);

        statusMsg.innerText = "正在处理...";
        const total = data.length;
        const chunkSize = 1048576;

        for (let i = dataOffset; i < total; i++) {
            if ((i - dataOffset) % 64 === 0) {
                hash = forge.md.sha256.create();
                hash.update(forge.util.binary.raw.encode(key));
                key = forge.util.binary.raw.decode(hash.digest().data);
            }
            data[i] ^= key[(i - dataOffset) % 32];
            
            if (i % chunkSize === 0) {
                progressBar.style.width = Math.round((i / total) * 100) + "%";
                await new Promise(r => setTimeout(r, 1));
            }
        }

        currentResultBlob = new Blob([data], { type: 'audio/wav' });
        audioPlayer.src = URL.createObjectURL(currentResultBlob);
        audioPlayer.style.display = 'block';
        
        progressContainer.style.display = 'none';
        runBtn.disabled = false;
        downloadBtn.disabled = false;
        statusMsg.innerText = "处理完成";
    }

    runBtn.onclick = process;
    
    downloadBtn.onclick = () => {
        if (!currentResultBlob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(currentResultBlob);
        a.download = "X_" + audioInput.files[0].name;
        a.click();
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
